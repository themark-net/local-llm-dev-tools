# Grok CLI fragment managed by pfy-mentat bootstrap/grok-cli.
# Applied idempotently by install.sh — safe to re-run.
# Does NOT contain secrets. Auth remains in ~/.grok/auth.json or XAI_API_KEY.

[memory]
enabled = true

# Permission posture for local trusted workstations. Override if you prefer prompts.
[ui]
permission_mode = "always-approve"

[mcp_servers.codebase-memory]
command = "codebase-memory-mcp"
args = []
enabled = true

# skills.paths is filled at install time with absolute paths to external packs:
#   skills-external/ponytail, skills-external/mattpocock (unless --no-*)
# Example after install:
# [skills]
# paths = [
#   "/absolute/path/to/bootstrap/grok-cli/skills-external/ponytail",
#   "/absolute/path/to/bootstrap/grok-cli/skills-external/mattpocock",
# ]
